<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数理小精灵：十之秘境</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 竖屏提示遮罩 -->
    <div id="rotate-overlay">
        <div class="rotate-content">
            <div class="rotate-icon">📱</div>
            <div class="rotate-arrow">↻</div>
            <div class="rotate-text">请将设备横屏使用</div>
            <div class="rotate-subtext">本游戏仅支持横屏模式</div>
        </div>
    </div>

    <div id="game-container">
        <header>
            <h1>数理小精灵：十之秘境</h1>
            <div id="level-display" class="level-display">第1关 尼比道馆</div>
            <div id="version-display">v0.41.0</div>
        </header>

        <main>
            <div id="player-pet" class="battle-column">
                <div class="pet-sprite">
                    <div class="pet-level">Lv.<span id="player-level">1</span></div>
                    <div class="pet-image" id="player-pet-image">🔥</div>
                    <div class="pet-name" id="player-pet-name">小火龙</div>
                    <div class="pet-hp-bar"><div class="hp-fill" id="player-hp-fill"></div></div>
                    <div class="pet-xp-bar"><div class="xp-fill" id="player-xp-fill"></div></div>
                </div>
            </div>

            <div id="center-panel">
                <div id="math-board" class="hidden">
                    <div id="timer-wrapper">
                        <div id="timer-bar">
                            <div id="timer-bar-fill" class="timer-phase-1"></div>
                        </div>
                        <span id="timer-speed-label"></span>
                    </div>
                    <div id="question-container">
                        <span id="question-text">准备战斗！</span>
                    </div>
                    <div id="answer-buttons">
                        <button class="answer-btn" data-answer="0">?</button>
                        <button class="answer-btn" data-answer="0">?</button>
                        <button class="answer-btn" data-answer="0">?</button>
                    </div>
                </div>

                <div id="explore-hint" class="explore-hint">
                    <div class="hint-content">
                        <span class="hint-icon">⚔️</span>
                        <span class="hint-text">点击"探索"按钮开始冒险！</span>
                        <span class="hint-subtext">第1关 尼比道馆 (1/5)</span>
                    </div>
                </div>

                <div id="game-controls">
                    <button id="explore-btn">探索</button>
                    <button id="potion-btn">恢复药水</button>
                    <button id="stats-btn">查看状态</button>
                </div>
            </div>

            <div id="enemy-monster" class="battle-column">
                <div class="monster-sprite">
                    <div class="trainer-name" id="trainer-name"></div>
                    <div class="monster-name" id="monster-name"></div>
                    <div class="monster-image" id="enemy-monster-image"></div>
                    <div class="monster-hp-bar"><div class="hp-fill" id="enemy-hp-fill"></div></div>
                </div>
            </div>
        </main>

        <div id="message-overlay" class="hidden">
            <div id="message-content">
                <p id="message-text"></p>
                <button id="message-ok-btn">确定</button>
            </div>
        </div>

        <div id="pet-selection">
            <h2>选择你的初始宝可梦</h2>
            <div class="pet-options">
                <div class="pet-option" data-pet="fire">
                    <div class="pet-preview fire-pet">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="小火龙" class="preview-sprite">
                    </div>
                    <span>小火龙</span>
                    <small>火系 · 攻击型</small>
                </div>
                <div class="pet-option" data-pet="water">
                    <div class="pet-preview water-pet">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="杰��龟" class="preview-sprite">
                    </div>
                    <span>杰尼龟</span>
                    <small>水系 · 防御型</small>
                </div>
                <div class="pet-option" data-pet="grass">
                    <div class="pet-preview grass-pet">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="妙蛙种子" class="preview-sprite">
                    </div>
                    <span>妙蛙种子</span>
                    <small>草系 · 平衡型</small>
                </div>
            </div>
            <div id="save-info" class="save-info hidden">
                <p id="save-info-text"></p>
                <div class="save-buttons">
                    <button id="continue-save-btn">继续游戏</button>
                    <button id="new-game-btn">新游戏</button>
                </div>
            </div>
            <button id="confirm-pet-btn">确认选择</button>
        </div>

        <div id="stats-panel" class="hidden">
            <h2>宝可梦状态</h2>
            <div class="stats-content">
                <p>宝可梦名称：<span id="pet-name">小火龙</span></p>
                <p>等级：<span id="pet-level-display">1</span></p>
                <p>经验值：<span id="pet-xp">0</span>/<span id="xp-to-next">100</span></p>
                <p>生命值：<span id="pet-hp">100</span>/<span id="pet-max-hp">100</span></p>
                <p>攻击力：<span id="pet-attack">10</span></p>
                <p>当前关卡：<span id="current-level">1-1</span></p>
                <p>击败训练师数：<span id="monsters-defeated">0</span></p>
            </div>
            <button id="close-stats-btn">关闭</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
